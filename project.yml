name: Bimonth
options:
  bundleIdPrefix: tw.hanamizuki
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_PREVIEWS: YES

targets:
  Bimonth:
    type: application
    platform: macOS
    sources:
      - path: Bimonth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.hanamizuki.bimonth
        PRODUCT_NAME: Bimonth
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGN_ENTITLEMENTS: Bimonth/Bimonth.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BimonthWidget
    scheme:
      testTargets:
        - BimonthTests

  BimonthWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: BimonthWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.hanamizuki.bimonth.widget
        PRODUCT_NAME: BimonthWidget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BimonthWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: BimonthWidget/BimonthWidget.entitlements
        SKIP_INSTALL: YES

  BimonthTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BimonthTests
      - path: BimonthWidget/Logic/MonthResolver.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tw.hanamizuki.bimonth.Tests
