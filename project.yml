name: Bimonth
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_PREVIEWS: YES
    # Version is set here once so the container app's auto-generated Info.plist
    # and the widget extension's Info.plist (via $(CURRENT_PROJECT_VERSION) /
    # $(MARKETING_VERSION) substitution) stay in sync. Mismatched versions
    # trigger an embeddedBinaryValidationUtility warning at build time.
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"

targets:
  Bimonth:
    type: application
    platform: macOS
    sources:
      - path: Bimonth
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.bimonth
        PRODUCT_NAME: Bimonth
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGN_ENTITLEMENTS: Bimonth/Bimonth.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BimonthWidget
    scheme:
      testTargets:
        - BimonthTests

  BimonthWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: BimonthWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.bimonth.widget
        PRODUCT_NAME: BimonthWidget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BimonthWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: BimonthWidget/BimonthWidget.entitlements
        SKIP_INSTALL: YES

  BimonthTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BimonthTests
      - path: BimonthWidget/Logic/MonthResolver.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.bimonth.Tests
