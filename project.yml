name: Bimonth
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_PREVIEWS: YES
    # Xcode 16+ defaults Debug builds to a thin main binary + .debug.dylib for
    # faster incremental linking. macOS WidgetKit's host (chronod) cannot
    # follow the @rpath load to the split dylib in its sandbox, so it falls
    # back to the last successful snapshot — code edits never reach the
    # rendered widget. Forcing a monolithic binary is the only reliable fix
    # for widget development. See debugging session 2026-04-26.
    ENABLE_DEBUG_DYLIB: NO
    # Version is set here once so the container app's auto-generated Info.plist
    # and the widget extension's Info.plist (via $(CURRENT_PROJECT_VERSION) /
    # $(MARKETING_VERSION) substitution) stay in sync. Mismatched versions
    # trigger an embeddedBinaryValidationUtility warning at build time.
    # Bump CURRENT_PROJECT_VERSION on ANY widget change: chronod caches the
    # widget descriptor keyed by CFBundleVersion, so already-installed machines
    # keep serving the old descriptor/snapshot until the version changes. See
    # CLAUDE.md "Versioning".
    CURRENT_PROJECT_VERSION: "4"
    MARKETING_VERSION: "0.0.2"

# Per-configuration xcconfig supplying BIMONTH_BUNDLE_PREFIX and DEVELOPMENT_TEAM.
# Template defaults (com.example / empty team) live in Config/Signing.xcconfig;
# personal App Store distribution values go in the gitignored
# Config/Signing.local.xcconfig. See README "First-time setup".
configFiles:
  Debug: Config/Signing.xcconfig
  Release: Config/Signing.xcconfig

targets:
  Bimonth:
    type: application
    platform: macOS
    sources:
      - path: Bimonth
      - path: Shared
      # Compile the widget's calendar views and resolver into the container app
      # too, so ContentView can render a live two-month preview that exactly
      # matches the installed widget. Files keep their canonical home under
      # BimonthWidget/; the duplication is module-scoped only.
      - path: BimonthWidget/Views/MonthView.swift
      - path: BimonthWidget/Views/DayCell.swift
      - path: BimonthWidget/Logic/MonthResolver.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BIMONTH_BUNDLE_PREFIX).bimonth
        PRODUCT_NAME: Bimonth
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGN_ENTITLEMENTS: Bimonth/Bimonth.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BimonthWidget
    scheme:
      testTargets:
        - BimonthTests

  BimonthWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: BimonthWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BIMONTH_BUNDLE_PREFIX).bimonth.widget
        PRODUCT_NAME: BimonthWidget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BimonthWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: BimonthWidget/BimonthWidget.entitlements
        SKIP_INSTALL: YES

  BimonthTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BimonthTests
      - path: BimonthWidget/Logic/MonthResolver.swift
      - path: BimonthWidget/Logic/MonthNavigationStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BIMONTH_BUNDLE_PREFIX).bimonth.Tests
